name: CI/CD Pipeline - Retro Arsitektur

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  #  CI: Build & Check (berjalan di semua branch)
  # ============================================================
  ci:
    name: 🔍 CI - Build & Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, pdo, pdo_mysql, dom, filter, gd, json, session, tokenizer, xmlwriter
          coverage: none

      - name: 📦 Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev --ignore-platform-reqs

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🏗️ Build assets (Vite)
        run: npm run build

      - name: 📋 Cek file .env tersedia
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: ✅ Cek syntax PHP (lint)
        run: find app/ -name "*.php" | xargs php -l

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: public/build/
          retention-days: 1

  # ============================================================
  #  CD: Deploy ke cPanel via FTP (hanya branch main)
  # ============================================================
  deploy:
    name: 🚀 CD - Deploy ke cPanel
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, pdo, pdo_mysql, dom, filter, gd, json, session, tokenizer, xmlwriter
          coverage: none

      - name: 📦 Install Composer dependencies (production)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev --ignore-platform-reqs

      - name: 🤐 Kompres folder vendor menjadi ZIP
        run: zip -r vendor.zip vendor

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: 📦 Install NPM dependencies
        run: npm ci

      - name: 🏗️ Build assets (Vite - production)
        run: npm run build

      - name: 🏗️ Build assets (Vite - production)
        run: npm run build

      - name: 🚀 Deploy ke cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env*
            **/README.md
            **/.github/**
            **/vite.config.js
            **/package.json
            **/package-lock.json
            **/postcss.config.js
            **/tailwind.config.js
            **/vendor/**

      - name: ✅ Notifikasi Deploy Berhasil
        if: success()
        run: echo "🎉 Deploy berhasil ke production!"

      - name: ❌ Notifikasi Deploy Gagal
        if: failure()
        run: echo "💥 Deploy gagal! Cek logs di atas."
